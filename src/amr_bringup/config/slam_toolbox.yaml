slam_toolbox:
  ros__parameters:
    use_sim_time: true
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT

    odom_frame:  odom
    map_frame:   map
    base_frame:  base_link
    scan_topic:  /scan
    mode:        mapping

    resolution:               0.05
    max_laser_range:          20.0
    map_update_interval:      2.0
    transform_publish_period: 0.02
    minimum_time_interval:    0.2
    transform_timeout:        0.2
    tf_buffer_duration:       30.0
    throttle_scans:           1
    stack_size_to_use:        40000000
    enable_interactive_mode:  true

    # ── wall-slip tolerance ───────────────────────────────────────────
    # Search 1 m around the odometry guess instead of the default ~0.3 m.
    # When the robot pushes into a wall and odometry jumps forward, the
    # scan matcher can still find where the robot actually is.
    correlation_search_space_dimension:          1.0
    correlation_search_space_resolution:         0.01
    correlation_search_space_angular_dimension:  0.5
    correlation_search_space_angular_resolution: 0.0087  # ~0.5 deg steps

    # Process scans often so slip is caught within one scan cycle.
    minimum_travel_distance: 0.05
    minimum_travel_heading:  0.05

    # Accept scan matches from a wider area (lower = more permissive).
    link_match_minimum_response_fine: 0.35
    link_scan_maximum_distance:       1.5

    # ── loop closing ─────────────────────────────────────────────────
    # Corrects accumulated drift whenever the robot revisits a place it
    # has already mapped — this undoes wall-slip errors retroactively.
    do_loop_closing:                    true
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine:   0.45
    loop_match_maximum_variance_coarse: 3.0
    loop_search_space_dimension:        8.0
    loop_search_space_resolution:       0.05
    loop_search_space_smear_deviation:  0.03
